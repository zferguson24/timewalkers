# Datasource — Railway injects PG* vars; local dev defaults used as fallback
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:timewalkersdb}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Railway injects PORT at runtime; fall back to 8080 locally
server.port=${PORT:8080}

# API key for endpoint authentication — must be set as an environment variable
api.key=${API_KEY}
