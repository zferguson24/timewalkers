# Datasource — the EC2 instance's systemd EnvironmentFile injects PG* vars; local dev defaults used as fallback
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:timewalkersdb}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=${PORT:8080}

# API key for endpoint authentication — must be set as an environment variable
api.key=${API_KEY}

# Default log level: WARN and ERROR are emitted in all environments.
# The local profile overrides this to DEBUG — see application-local.properties.
logging.level.com.wow.timewalkers=WARN

# Tomcat access logging — feeds the RequestCount CloudWatch metric used to detect
# sustained inactivity, so the EC2 instance can auto-stop after 7 idle days.
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=/var/log/timewalkers/access
server.tomcat.accesslog.prefix=access
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b
server.tomcat.accesslog.rotate=true
