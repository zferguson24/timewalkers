name: Deploy to EC2 (via SSM)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Upload JAR to S3
        run: aws s3 cp target/timewalkers-0.0.1-SNAPSHOT.jar s3://${{ secrets.DEPLOY_BUCKET }}/timewalkers.jar

      - name: Ensure EC2 instance is running
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --query "Reservations[0].Instances[0].State.Name" --output text)
          echo "Current instance state: $STATE"

          if [ "$STATE" == "stopped" ]; then
            echo "Instance is stopped — starting it..."
            aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }}
            aws ec2 wait instance-running --instance-ids ${{ secrets.EC2_INSTANCE_ID }}
          fi

          echo "Waiting for SSM Agent to report Online..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
              --query "InstanceInformationList[0].PingStatus" --output text 2>/dev/null)
            if [ "$STATUS" == "Online" ]; then
              echo "SSM Agent is online."
              break
            fi
            echo "Waiting for SSM Agent... ($i/30)"
            sleep 10
          done

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/timewalkers.jar /home/ubuntu/timewalkers.jar", "systemctl restart timewalkers"]' \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"
